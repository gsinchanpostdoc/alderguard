name: Deploy AlderIPM-Sim Web to GitHub Pages

# Publishes alder-ipm-sim-web/ to GitHub Pages so the live app lives at
# https://gsinchanpostdoc.github.io/alder-ipm-sim/
#
# Trigger: every push to main that touches alder-ipm-sim-web/ (or this workflow).
# Manual re-runs via the Actions tab are also enabled.

on:
  push:
    branches: [main]
    paths:
      - 'alder-ipm-sim-web/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload web app as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: alder-ipm-sim-web

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
